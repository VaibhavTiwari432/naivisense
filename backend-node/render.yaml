services:
  - type: web
    name: naivisense-api
    runtime: node
    buildCommand: npm install && npm run migrate && npm run seed
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: naivisense-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: naivisense-db
    databaseName: naivisense
    plan: free

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test_naivisense.db
      SECRET_KEY: ci-secret-key-not-for-production
      ENVIRONMENT: testing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  flutter:
    name: Flutter Tests & Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: naivisense

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run widget tests
        run: flutter test
